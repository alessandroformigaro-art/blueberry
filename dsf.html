<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blueberry.lol | Infinite Links Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap');

        /* Variabili Tema Blueberry */
        :root {
            --bg-dark: #030712;
            --panel-bg: #0b0f19;
            --input-bg: #161d30;
            --neon-blue: #3b82f6;
            --neon-glow: 0 0 10px rgba(59, 130, 246, 0.6), 0 0 20px rgba(59, 130, 246, 0.3);
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            height: 100vh;
            display: flex;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #0a1330 0%, var(--bg-dark) 100%);
        }

        /* --- DASHBOARD (Sinistra) --- */
        .dashboard-sidebar {
            width: 420px;
            background-color: var(--panel-bg);
            border-right: 1px solid rgba(59, 130, 246, 0.2);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 5px 0 25px rgba(0,0,0,0.7);
            z-index: 10;
        }

        .dashboard-header h2 {
            color: var(--neon-blue);
            text-shadow: var(--neon-glow);
            font-size: 1.6rem;
        }

        /* Sistema di Tab (Sezioni Clean) */
        .dashboard-tabs {
            display: flex;
            background: rgba(22, 29, 48, 0.4);
            padding: 5px;
            border-radius: 10px;
            border: 1px solid rgba(59, 130, 246, 0.1);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-muted);
            padding: 8px 0;
            font-weight: bold;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background-color: var(--neon-blue);
            color: white;
            box-shadow: var(--neon-glow);
        }

        /* Contenitori delle sezioni */
        .tab-content {
            display: none; 
            flex-direction: column;
            gap: 18px;
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .tab-content.active {
            display: flex; 
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: bold;
        }

        .input-group input, .input-group textarea, .input-group select {
            background-color: var(--input-bg);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: white;
            padding: 10px 12px;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .input-group input:focus, .input-group textarea:focus, .input-group select:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }

        /* Color Picker Component */
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .color-picker-wrapper input[type="color"] {
            padding: 0;
            width: 45px;
            height: 35px;
            border: none;
            cursor: pointer;
            background: none;
        }

        .input-group input[type="file"] {
            padding: 6px;
            cursor: pointer;
        }

        .input-group input[type="file"]::file-selector-button {
            background: var(--neon-blue);
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .or-divider {
            text-align: center;
            color: #374151;
            font-size: 0.75rem;
            font-weight: bold;
            margin: 2px 0;
        }

        /* Editor dei Link Dinamici */
        .link-editor {
            background: rgba(22, 29, 48, 0.3);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(59, 130, 246, 0.15);
            display: flex;
            flex-direction: column;
            gap: 10px;
            position: relative;
        }

        .link-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: #ef4444;
            color: white;
        }

        .btn-add-link {
            background: rgba(59, 130, 246, 0.1);
            border: 1px dashed var(--neon-blue);
            color: var(--neon-blue);
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            margin-top: 5px;
        }

        .btn-add-link:hover {
            background: rgba(59, 130, 246, 0.2);
            box-shadow: var(--neon-glow);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: auto; 
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-primary {
            background-color: var(--neon-blue);
            color: white;
            box-shadow: var(--neon-glow);
        }

        .btn-primary:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
        }

        .btn-secondary:hover {
            background-color: rgba(59, 130, 246, 0.1);
        }

        /* --- LIVE PREVIEW / PUBLIC PROFILE --- */
        .preview-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .preview-label {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(59, 130, 246, 0.2);
            color: var(--neon-blue);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid var(--neon-blue);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .profile-card {
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.25);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(59, 130, 246, 0.1);
            width: 360px;
            max-height: 85vh;
            position: relative;
            overflow-y: auto;
            padding: 185px 30px 35px 30px; 
            text-align: center;
        }

        /* Nasconde la scrollbar della card per renderla super clean */
        .profile-card::-webkit-scrollbar {
            width: 0px;
        }

        .card-banner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 125px;
            object-fit: cover;
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #0a0f1e;
            box-shadow: var(--neon-glow);
            object-fit: cover;
            position: absolute;
            top: 70px;
            left: calc(50% - 50px);
            z-index: 2;
        }

        .username-badge {
            font-size: 1.7rem;
            font-weight: bold;
            margin-bottom: 8px;
            display: inline-block;
        }

        p.bio {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .social-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .social-btn {
            display: block;
            text-decoration: none;
            color: white;
            background: rgba(59, 130, 246, 0.03);
            border: 1px solid rgba(59, 130, 246, 0.4);
            padding: 12px;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .social-btn:hover {
            background: var(--neon-blue);
            color: #fff;
            box-shadow: var(--neon-glow);
            transform: translateY(-2px);
        }

        /* --- ANIMAZIONI --- */
        .anim-pulse { animation: neonPulse 1.5s infinite ease-in-out; }
        @keyframes neonPulse {
            0%, 100% { text-shadow: 0 0 5px currentColor, 0 0 10px currentColor; }
            50% { text-shadow: 0 0 15px currentColor, 0 0 25px currentColor; }
        }

        .anim-glitch { animation: textGlitch 0.4s infinite linear; }
        @keyframes textGlitch {
            0% { text-shadow: 2px -1px 0 #ff0055, -2px 1px 0 #00ffcc; }
            25% { text-shadow: -1px -2px 0 #ff0055, 2px 2px 0 #00ffcc; }
            50% { text-shadow: 2px 2px 0 #ff0055, -1px -1px 0 #00ffcc; }
            75% { text-shadow: -2px 1px 0 #ff0055, 1px -2px 0 #00ffcc; }
            100% { text-shadow: 1px -2px 0 #ff0055, -2px 1px 0 #00ffcc; }
        }

        .anim-rainbow { animation: rainbowFlow 4s infinite linear; }
        @keyframes rainbowFlow {
            0% { color: #ff3333; text-shadow: 0 0 8px #ff3333; }
            33% { color: #33ff33; text-shadow: 0 0 8px #33ff33; }
            66% { color: #3333ff; text-shadow: 0 0 8px #3333ff; }
            100% { color: #ff3333; text-shadow: 0 0 8px #ff3333; }
        }

        .anim-bounce {
            animation: smoothBounce 2s infinite ease-in-out;
            display: inline-block;
        }
        @keyframes smoothBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>

    <!-- DASHBOARD -->
    <div class="dashboard-sidebar" id="dashboard">
        <div class="dashboard-header">
            <h2>blueberry.lol 🫐</h2>
            <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 3px;">Personalizza la tua pagina</p>
        </div>

        <!-- SEZIONI A SCHEDE (TABS) -->
        <div class="dashboard-tabs">
            <button class="tab-btn active" onclick="openTab('tab-profile', this)">Profilo</button>
            <button class="tab-btn" onclick="openTab('tab-design', this)">Design</button>
            <button class="tab-btn" onclick="openTab('tab-links', this)">Social</button>
        </div>

        <!-- SCHEDA 1: PROFILO -->
        <div id="tab-profile" class="tab-content active">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="input-username" placeholder="Es. blueberry">
            </div>
            <div class="input-group">
                <label>Biografia</label>
                <textarea id="input-bio" rows="4" placeholder="La tua bio..."></textarea>
            </div>
        </div>

        <!-- SCHEDA 2: DESIGN -->
        <div id="tab-design" class="tab-content">
            <div class="input-group">
                <label>Colore Nome Utente</label>
                <div class="color-picker-wrapper">
                    <input type="color" id="input-color" value="#ffffff">
                    <span style="font-size: 0.85rem; color: var(--text-muted);">Scegli un colore per il tuo @name</span>
                </div>
            </div>
            <div class="input-group">
                <label>Animazione Nome</label>
                <select id="input-anim">
                    <option value="none">Nessuna (Statico)</option>
                    <option value="pulse">Neon Pulse 🔵</option>
                    <option value="glitch">Cyber Glitch ⚡</option>
                    <option value="rainbow">Arcobaleno 🌈</option>
                    <option value="bounce">Rimbalzo Fluido 🎈</option>
                </select>
            </div>
            <div class="input-group">
                <label>Banner Card (Immagine o GIF)</label>
                <input type="text" id="input-banner-url" placeholder="Incolla URL...">
                <div class="or-divider">OPPURE</div>
                <input type="file" id="input-banner-file" accept="image/*">
            </div>
            <div class="input-group">
                <label>Immagine Profilo (Avatar)</label>
                <input type="text" id="input-avatar-url" placeholder="Incolla URL...">
                <div class="or-divider">OPPURE</div>
                <input type="file" id="input-avatar-file" accept="image/*">
            </div>
        </div>

        <!-- SCHEDA 3: LINKS (DYNAMIC EDITION) -->
        <div id="tab-links" class="tab-content">
            <div id="links-container" style="display: flex; flex-direction: column; gap: 15px;">
                <!-- I link dinamici verranno generati qui da JavaScript -->
            </div>
            <button type="button" class="btn-add-link" id="add-link-btn">+ Aggiungi Nuovo Social</button>
        </div>

        <!-- PULSANTI FISSI IN BASSO -->
        <div class="action-buttons">
            <button id="save-btn" class="btn btn-primary">Salva Profilo</button>
            <button id="mypage-btn" class="btn btn-secondary">My Page ↗</button>
        </div>
    </div>

    <!-- LIVE PREVIEW -->
    <div class="preview-area" id="preview-area">
        <div class="preview-label" id="preview-label">LIVE PREVIEW</div>
        
        <div class="profile-card">
            <img id="preview-banner" src="" alt="Banner" class="card-banner">
            <img id="preview-avatar" src="" alt="Avatar" class="avatar">
            
            <div class="username-badge" id="preview-username"></div>
            <p class="bio" id="preview-bio"></p>
            
            <div class="social-links" id="preview-links">
                <!-- I pulsanti effettivi verranno stampati qui -->
            </div>
        </div>
    </div>

    <script>
        // Database dei Dati Predefiniti v4 (Array di Links)
        const defaultData = {
            username: 'blueberry',
            nameColor: '#ffffff',
            animation: 'pulse',
            bio: 'lost inside the cyber mirtillo ecosystem 🧊',
            avatar: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=200&auto=format&fit=crop',
            banner: 'https://i.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3Y0ZHpnd3p4NHA2NDI0NzN0Mm96N3g4ZXN6Y28xamM3bndvOHp6byZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7qE1YN7aBOFPRw8E/giphy.gif',
            links: [
                { name: 'Discord Server', url: '#' },
                { name: 'Listen Spotify', url: '#' }
            ]
        };

        // Caricamento database locale
        let savedData = JSON.parse(localStorage.getItem('blueberry_v4_data')) || defaultData;

        // Funzione per cambiare Tab della Dashboard
        function openTab(tabId, buttonEl) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            buttonEl.classList.add('active');
        }

        // Funzione per generare un blocco di input per un Social Link nell'Editor
        function createLinkInputRow(name = '', url = '') {
            const container = document.getElementById('links-container');
            
            const div = document.createElement('div');
            div.className = 'link-editor';
            div.innerHTML = `
                <div class="link-header">
                    <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: bold;">Collegamento</span>
                    <button type="button" class="btn-delete">Elimina</button>
                </div>
                <div class="input-group">
                    <label>Nome Pulsante</label>
                    <input type="text" class="input-link-name" value="${name}" placeholder="Es. Instagram, GitHub...">
                </div>
                <div class="input-group">
                    <label>URL / Link</label>
                    <input type="text" class="input-link-url" value="${url}" placeholder="https://...">
                </div>
            `;

            // Rendi gli input reattivi in tempo reale
            div.querySelectorAll('input').forEach(input => {
                input.addEventListener('input', () => renderProfile(gatherData()));
            });

            // Gestione del tasto elimina riga
            div.querySelector('.btn-delete').addEventListener('click', () => {
                div.remove();
                renderProfile(gatherData()); // Forza l'aggiornamento grafico della card
            });

            container.appendChild(div);
        }

        // Raccoglie tutti i dati inseriti nei campi della Dashboard
        function gatherData() {
            // Raccoglie dinamicamente l'array dei link creati
            const dynamicLinks = [];
            document.querySelectorAll('.link-editor').forEach(editor => {
                const name = editor.querySelector('.input-link-name').value;
                const url = editor.querySelector('.input-link-url').value;
                if(name) { // aggiunge solo se ha un nome impostato
                    dynamicLinks.push({ name, url });
                }
            });

            return {
                username: document.getElementById('input-username').value || 'user',
                nameColor: document.getElementById('input-color').value,
                animation: document.getElementById('input-anim').value,
                bio: document.getElementById('input-bio').value,
                avatar: document.getElementById('preview-avatar').src,
                banner: document.getElementById('preview-banner').src,
                links: dynamicLinks
            };
        }

        // Renderizza l'output della Card (Live o Pagina Pubblica)
        function renderProfile(data) {
            document.getElementById('preview-banner').src = data.banner;
            document.getElementById('preview-avatar').src = data.avatar;
            document.getElementById('preview-bio').textContent = data.bio;
            
            const usernameEl = document.getElementById('preview-username');
            usernameEl.textContent = '@' + data.username;
            
            // Colore e animazioni del nome
            usernameEl.className = "username-badge";
            if (data.animation === 'rainbow') {
                usernameEl.style.color = ''; 
                usernameEl.classList.add('anim-rainbow');
            } else {
                usernameEl.style.color = data.nameColor; 
                if (data.animation !== 'none') {
                    usernameEl.classList.add('anim-' + data.animation);
                }
            }

            // Render dei Link Infiniti nella card
            const linksContainer = document.getElementById('preview-links');
            linksContainer.innerHTML = ''; // Svuota i vecchi pulsanti
            
            data.links.forEach(link => {
                const a = document.createElement('a');
                a.href = link.url || '#';
                a.target = '_blank';
                a.className = 'social-btn';
                a.textContent = link.name;
                linksContainer.appendChild(a);
            });
        }

        // Routing tra Dashboard e Visualizzazione Profilo
        const urlParams = new URLSearchParams(window.location.search);
        const isPublicPage = urlParams.get('view') === 'profile';

        if (isPublicPage) {
            document.title = `@${savedData.username} | blueberry.lol`;
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('preview-label').style.display = 'none';
            renderProfile(savedData);
        } else {
            // Setup iniziale degli input con i vecchi dati salvati
            document.getElementById('input-banner-url').value = savedData.banner.startsWith('data:') ? '' : savedData.banner;
            document.getElementById('input-avatar-url').value = savedData.avatar.startsWith('data:') ? '' : savedData.avatar;
            document.getElementById('input-username').value = savedData.username;
            document.getElementById('input-color').value = savedData.nameColor;
            document.getElementById('input-anim').value = savedData.animation;
            document.getElementById('input-bio').value = savedData.bio;

            // Genera le righe dei link salvati nell'interfaccia
            if(savedData.links && savedData.links.length > 0) {
                savedData.links.forEach(link => createLinkInputRow(link.name, link.url));
            } else {
                createLinkInputRow('', ''); // Almeno una riga vuota di default
            }

            renderProfile(savedData);

            // Listener per i campi base reattivi
            const reactiveInputs = ['input-username', 'input-color', 'input-anim', 'input-bio'];
            reactiveInputs.forEach(id => {
                document.getElementById(id).addEventListener('input', () => renderProfile(gatherData()));
            });

            // Gestione del tasto "+ Aggiungi Nuovo Social"
            document.getElementById('add-link-btn').addEventListener('click', () => {
                createLinkInputRow('', '');
            });

            // Immagini tramite URL
            document.getElementById('input-avatar-url').addEventListener('input', (e) => {
                document.getElementById('preview-avatar').src = e.target.value || defaultData.avatar;
            });
            document.getElementById('input-banner-url').addEventListener('input', (e) => {
                document.getElementById('preview-banner').src = e.target.value || defaultData.banner;
            });

            // File Uploader Locali
            document.getElementById('input-avatar-file').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        document.getElementById('preview-avatar').src = event.target.result;
                        document.getElementById('input-avatar-url').value = ''; 
                    };
                    reader.readAsDataURL(file);
                }
            });

            document.getElementById('input-banner-file').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        document.getElementById('preview-banner').src = event.target.result;
                        document.getElementById('input-banner-url').value = ''; 
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Pulsante Salva Profilo
            document.getElementById('save-btn').addEventListener('click', () => {
                localStorage.setItem('blueberry_v4_data', JSON.stringify(gatherData()));
                const btn = document.getElementById('save-btn');
                btn.textContent = "✔ Profilo Aggiornato!";
                btn.style.backgroundColor = "#10b981";
                setTimeout(() => {
                    btn.textContent = "Salva Profilo";
                    btn.style.backgroundColor = "var(--neon-blue)";
                }, 2000);
            });

            // Pulsante Genera la tua Pagina
            document.getElementById('mypage-btn').addEventListener('click', () => {
                const currentUrl = window.location.href.split('?')[0];
                window.open(currentUrl + '?view=profile', '_blank');
            });
        }
    </script>
</body>
</html>
